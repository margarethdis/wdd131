<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temple Album | Margareth Ramos</title>
  <meta name="description" content="Photo album of temples of The Church of Jesus Christ of Latter-day Saints.">
  <meta name="author" content="Margareth Daniela Ramos Discua">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- CSS: mobile-first first, then large -->
  <link rel="stylesheet" href="styles/temples.css">
  <link rel="stylesheet" href="styles/temples-large.css">

  <script src="scripts/temples.js" defer></script>
</head>
<body>

  <header class="site-header">
    <p class="site-title">Temple Album</p>

    <button id="hamburger-btn" class="hamburger-btn" aria-label="Open navigation menu" aria-expanded="false">
      <span class="hamburger-icon">&#9776;</span>
    </button>

    <nav id="main-nav" class="main-nav">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Old</a></li>
        <li><a href="#">New</a></li>
        <li><a href="#">Large</a></li>
        <li><a href="#">Small</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>Temples Around the World</h1>

    <div class="temple-grid">
      <figure>
        <img src="images/salt-lake.jpg" alt="Salt Lake Temple" loading="lazy" width="500" height="400">
        <figcaption>Salt Lake Temple</figcaption>
      </figure>

      <figure>
        <img src="images/los-angeles.jpg" alt="Los Angeles Temple" loading="lazy" width="500" height="400">
        <figcaption>Los Angeles Temple</figcaption>
      </figure>

      <figure>
        <img src="images/mexico-city.jpg" alt="Mexico City Temple" loading="lazy" width="500" height="400">
        <figcaption>Mexico City Temple</figcaption>
      </figure>

      <figure>
        <img src="images/san-pedro-sula.jpg" alt="San Pedro Sula Temple" loading="lazy" width="500" height="400">
        <figcaption>San Pedro Sula Temple</figcaption>
      </figure>

      <figure>
        <img src="images/tegucigalpa.jpg" alt="Tegucigalpa Temple" loading="lazy" width="500" height="400">
        <figcaption>Tegucigalpa Temple</figcaption>
      </figure>

      <figure>
        <img src="images/guatemala.png" alt="Guatemala City Temple" loading="lazy" width="500" height="400">
        <figcaption>Guatemala City Temple</figcaption>
      </figure>

      <figure>
        <img src="images/colombia.png" alt="Bogotá Temple" loading="lazy" width="500" height="400">
        <figcaption>Bogotá Temple</figcaption>
      </figure>

      <figure>
        <img src="images/panama.jpg" alt="Panama City Temple" loading="lazy" width="500" height="400">
        <figcaption>Panama City Temple</figcaption>
      </figure>

      <figure>
        <img src="images/lima-peru.png" alt="Lima Temple" loading="lazy" width="500" height="400">
        <figcaption>Lima Temple</figcaption>
      </figure>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="year"></span> Margareth Daniela Ramos Discua | WDD 131</p>
    <p>Last Modification: <span id="last-modified"></span></p>
  </footer>

</body>
</html>

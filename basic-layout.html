<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - My Page</title>
    <link rel="stylesheet" href="styles/layout.css">
</head>

<!--lo primero es el header y el nav va anidado al header 
mejora la semantica del sitio y ayuda a la accesibilidad -->
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Projects</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <!--3 sigue el main (dentro va contenido principal 
    contenido adicional como enlaces, publicidad)-->
<main>
    <h2>Main Content</h2>
</main>

<aside class="Left-sidebar">
    <h2>Left Sidebar</h2>
    <p>Contenido adicional , enlaces , publicidad</p>
</aside>

<aside class="Right-sidebar">
    <h2>Right Sidebar</h2>
    <p>Contenido adicional , Informacion de contacto</p>    
</aside>\

<!--4 ultimo el footer dentro de body siempre-->
<footer>
    <p>Footer Content</p>
</footer>



    
</body>
</html>
